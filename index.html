<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Explorer Mission — هل أنت مستعد لاستكشاف عالم الذكاء الاصطناعي؟</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,Arial,sans-serif;background:#000;min-height:100vh;}
#app{width:100%;min-height:100vh;background:#000;position:relative;overflow-x:hidden;}
.screen{display:none;width:100%;min-height:100vh;position:relative;overflow:hidden;}
.screen.active{display:block;}
.starfield{position:absolute;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;border-radius:50%;background:#fff;}
.star.tw{animation:tw var(--d,2s) ease-in-out infinite var(--dl,0s);}
@keyframes tw{0%,100%{opacity:var(--lo,.2);}50%{opacity:1;}}
.star.sh{animation:sh 5s ease-in infinite var(--dl,0s);}
@keyframes sh{0%{opacity:0;transform:translate(0,0);}6%{opacity:1;}35%{opacity:0;transform:translate(-100px,50px);}100%{opacity:0;}}
.nring{position:absolute;border-radius:50%;border:1px solid rgba(57,255,20,0.07);animation:nr var(--nd,6s) ease-in-out infinite var(--ndd,0s);}
@keyframes nr{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1);}50%{opacity:.85;transform:translate(-50%,-50%) scale(1.06);}}
.pt{position:absolute;border-radius:50%;background:#39FF14;animation:pt var(--pd,7s) ease-in-out infinite var(--pdd,0s);}
@keyframes pt{0%,100%{transform:translate(0,0);opacity:.25;}50%{transform:translate(var(--px,8px),var(--py,-16px));opacity:.85;}}
.fade-up{animation:fup .45s ease both;}
@keyframes fup{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.content{position:relative;z-index:2;padding:26px 22px 22px;}

/* HOME */
.badge-pill{display:inline-block;background:#39FF14;color:#000;font-size:10px;font-weight:800;padding:4px 14px;border-radius:20px;letter-spacing:.05em;animation:pop .5s ease .1s both;}
@keyframes pop{from{opacity:0;transform:scale(.75);}to{opacity:1;transform:scale(1);}}
.home-rocket{font-size:64px;display:block;filter:drop-shadow(0 0 18px rgba(57,255,20,.7));animation:hover 2.8s ease-in-out infinite,pop .6s ease .3s both;}
@keyframes hover{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.home-title-ar{font-size:28px;font-weight:900;color:#39FF14;line-height:1.2;text-shadow:0 0 28px rgba(57,255,20,.35);animation:fup .5s ease .4s both;}
.home-title-en{font-size:12px;color:#39FF14;opacity:.45;font-weight:600;margin-bottom:20px;animation:fup .5s ease .55s both;}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;animation:fup .5s ease .7s both;max-width:340px;margin-left:auto;margin-right:auto;}
.lcard{background:rgba(57,255,20,.06);border:1.5px solid rgba(57,255,20,.25);border-radius:13px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;}
.lcard:hover{background:rgba(57,255,20,.16);border-color:rgba(57,255,20,.7);transform:translateY(-3px);}
.lcard-flag{font-size:22px;margin-bottom:5px;line-height:1;}
.lcard-name{font-size:17px;font-weight:900;color:#39FF14;}
.lcard-hint{font-size:11px;color:#39FF14;opacity:.4;margin-top:1px;}
.soc-row{display:flex;justify-content:center;gap:7px;animation:fup .5s ease .9s both;}
.si{width:28px;height:28px;background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.2);border-radius:7px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;}
.si:hover{background:rgba(57,255,20,.2);border-color:rgba(57,255,20,.6);}
.si svg{width:13px;height:13px;fill:#39FF14;}
.hhandle{font-size:10px;color:#39FF14;opacity:.25;text-align:center;margin-top:8px;letter-spacing:.03em;animation:fup .5s ease 1s both;}
.orb{position:absolute;border-radius:50%;border:1px dashed rgba(57,255,20,.14);animation:orb var(--os,12s) linear infinite;}
@keyframes orb{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.orb-sat{position:absolute;top:-10px;left:50%;margin-left:-10px;font-size:18px;line-height:1;}
.fly-robot{position:absolute;font-size:24px;filter:drop-shadow(0 0 6px rgba(57,255,20,.5));animation:fly 9s ease-in-out infinite;z-index:1;}
@keyframes fly{0%{top:18%;left:-8%;opacity:0;}8%{opacity:1;}42%{top:8%;left:92%;opacity:1;}50%,100%{opacity:0;left:92%;}}

/* INTRO */
.mission-badge{display:inline-block;background:rgba(57,255,20,.12);border:1px solid rgba(57,255,20,.4);color:#39FF14;font-size:10px;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:.05em;margin-bottom:10px;}
.mission-icon{font-size:40px;display:block;margin-bottom:8px;filter:drop-shadow(0 0 12px rgba(57,255,20,.6));animation:hover 3s ease-in-out infinite;}
.mission-title-ar{font-size:24px;font-weight:900;color:#39FF14;line-height:1.25;margin-bottom:2px;}
.mission-title-en{font-size:12px;color:#39FF14;opacity:.45;font-weight:600;margin-bottom:10px;}
.mission-p{font-size:13px;color:#39FF14;opacity:.65;line-height:1.75;margin-bottom:16px;}
.ranks-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:16px;}
.rank-card{background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.18);border-radius:9px;padding:8px 4px;text-align:center;}
.rank-icon{font-size:18px;display:block;margin-bottom:3px;line-height:1;}
.rank-ar{font-size:11px;font-weight:800;color:#39FF14;}
.rank-en{font-size:9px;color:#39FF14;opacity:.45;margin-top:1px;}
.role-lbl{font-size:12px;font-weight:800;color:#39FF14;margin-bottom:7px;opacity:.8;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.rbtn{background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.2);border-radius:9px;padding:9px 8px;cursor:pointer;font-size:12px;font-weight:700;color:#39FF14;font-family:inherit;line-height:1.3;transition:all .15s;}
.rbtn:hover{background:rgba(57,255,20,.18);border-color:rgba(57,255,20,.6);}
.rbtn.picked{background:#39FF14;color:#000;border-color:#39FF14;}
.launch-btn{width:100%;padding:13px;background:#39FF14;color:#000;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:.02em;}
.launch-btn:hover{background:#2ee010;}
.launch-btn:disabled{opacity:.3;cursor:not-allowed;}

/* QUESTION */
.mission-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.mission-tag{font-size:10px;font-weight:800;color:#39FF14;opacity:.55;text-transform:uppercase;letter-spacing:.08em;background:rgba(57,255,20,.08);padding:3px 10px;border-radius:10px;}
.mission-num{font-size:11px;font-weight:900;color:#39FF14;opacity:.7;}
.prog-wrap{margin-bottom:12px;}
.prog-track{height:4px;background:rgba(57,255,20,.15);border-radius:2px;overflow:hidden;}
.prog-bar{height:100%;background:#39FF14;border-radius:2px;transition:width .5s ease;}
.dots{display:flex;gap:4px;justify-content:center;margin-top:6px;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(57,255,20,.15);transition:all .3s;}
.dot.done{background:#39FF14;}.dot.now{background:#39FF14;box-shadow:0 0 0 3px rgba(57,255,20,.2);}
.q-sticker{font-size:30px;display:block;margin-bottom:5px;filter:drop-shadow(0 0 8px rgba(57,255,20,.4));}
.q-cat{font-size:10px;font-weight:800;color:#39FF14;opacity:.45;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
.q-title-ar{font-size:19px;font-weight:900;color:#39FF14;line-height:1.35;margin-bottom:2px;}
.q-title-en{font-size:11px;color:#39FF14;opacity:.4;font-weight:600;margin-bottom:7px;line-height:1.4;}
.q-ins{font-size:11px;color:#39FF14;opacity:.5;line-height:1.6;padding:6px 10px;background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.12);border-radius:8px;margin-bottom:11px;}
.opts{display:flex;flex-direction:column;gap:6px;}
.opt{background:rgba(57,255,20,.05);border:1px solid rgba(57,255,20,.18);border-radius:10px;padding:10px 12px;cursor:pointer;display:flex;align-items:flex-start;gap:9px;transition:all .15s;width:100%;}
.opt:hover{background:rgba(57,255,20,.14);border-color:rgba(57,255,20,.55);}
.opt.chosen{background:rgba(57,255,20,.18);border-color:#39FF14;box-shadow:0 0 0 1px rgba(57,255,20,.3);}
.opt-num{width:22px;height:22px;border-radius:50%;background:rgba(57,255,20,.1);border:1px solid rgba(57,255,20,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#39FF14;flex-shrink:0;margin-top:1px;transition:all .15s;}
.opt.chosen .opt-num{background:#39FF14;color:#000;border-color:#39FF14;}
.opt-txt{font-size:12px;font-weight:700;color:#39FF14;line-height:1.4;flex:1;opacity:.85;}
.opt.chosen .opt-txt{opacity:1;}
.opt-emoji{font-size:14px;flex-shrink:0;margin-top:1px;opacity:.7;}
.opt.chosen .opt-emoji{opacity:1;}
.transmission{margin-top:10px;padding:9px 12px;background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.2);border-radius:8px;font-size:12px;font-weight:700;color:#39FF14;line-height:1.65;opacity:0;transition:opacity .5s;}
.transmission::before{content:"📡 TRANSMISSION: ";font-size:10px;opacity:.6;}
.transmission.show{opacity:1;}
.q-nav{display:flex;gap:7px;margin-top:10px;}
.q-nav.ar-nav{flex-direction:row-reverse;}
.btn-back{flex:1;padding:10px;border-radius:10px;border:1.5px solid rgba(57,255,20,.35);background:transparent;color:#39FF14;cursor:pointer;font-weight:900;font-family:inherit;font-size:13px;transition:all .15s;}
.btn-back:hover{border-color:#39FF14;background:rgba(57,255,20,.08);}
.btn-next{flex:2;padding:10px;border-radius:10px;border:none;background:#39FF14;color:#000;cursor:pointer;font-weight:900;font-family:inherit;font-size:13px;transition:all .15s;}
.btn-next:hover{background:#2ee010;}
.btn-next:disabled{opacity:.3;cursor:not-allowed;}
.handle-bar{display:flex;justify-content:space-between;align-items:center;padding:0;margin-top:10px;}
.handle-txt{font-size:10px;color:#39FF14;opacity:.25;line-height:1.4;}
.mini-soc{display:flex;gap:5px;}
.msi{width:22px;height:22px;background:rgba(57,255,20,.07);border:1px solid rgba(57,255,20,.15);border-radius:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.msi:hover{background:rgba(57,255,20,.18);}
.msi svg{width:11px;height:11px;fill:#39FF14;}

/* RESULT */
.launch-seq{text-align:center;padding:20px 0 12px;}
.ls-icon{font-size:56px;display:block;margin-bottom:12px;animation:ls-rocket 1s ease-in-out infinite alternate;filter:drop-shadow(0 0 16px rgba(57,255,20,.7));}
@keyframes ls-rocket{from{transform:translateY(0) scale(1);}to{transform:translateY(-10px) scale(1.04);}}
.ls-rank-ar{font-size:32px;font-weight:900;color:#39FF14;text-shadow:0 0 24px rgba(57,255,20,.4);margin-bottom:2px;}
.ls-rank-en{font-size:16px;color:#39FF14;opacity:.5;font-weight:700;margin-bottom:14px;}
.score-module{background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.2);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.score-meta{display:flex;justify-content:space-between;font-size:12px;font-weight:800;color:#39FF14;margin-bottom:6px;opacity:.8;}
.score-track{height:8px;background:rgba(57,255,20,.1);border-radius:4px;overflow:hidden;}
.score-fill{height:100%;background:#39FF14;border-radius:4px;transition:width 1.2s ease;box-shadow:0 0 8px rgba(57,255,20,.4);}
.pct-module{background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.2);border-radius:12px;padding:13px 14px;margin-bottom:10px;text-align:center;}
.pct-big{font-size:42px;font-weight:900;color:#39FF14;line-height:1;text-shadow:0 0 20px rgba(57,255,20,.4);}
.pct-label-ar{font-size:13px;font-weight:800;color:#39FF14;margin-top:5px;line-height:1.4;}
.pct-label-en{font-size:11px;color:#39FF14;opacity:.5;margin-top:2px;}
.pct-track{height:5px;background:rgba(57,255,20,.1);border-radius:3px;overflow:hidden;margin-top:9px;}
.pct-fill{height:100%;background:#39FF14;border-radius:3px;transition:width 1.4s ease;}
.pct-hint{font-size:10px;color:#39FF14;opacity:.35;margin-top:3px;}
.rank-ladder{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:10px;}
.rl{background:rgba(57,255,20,.04);border:1px solid rgba(57,255,20,.12);border-radius:8px;padding:7px 4px;text-align:center;opacity:.25;transition:all .4s;}
.rl.active{background:rgba(57,255,20,.12);border-color:#39FF14;opacity:1;transform:scale(1.07);box-shadow:0 0 12px rgba(57,255,20,.2);}
.rl-icon{font-size:14px;display:block;margin-bottom:2px;line-height:1;}
.rl-ar{font-size:10px;font-weight:800;color:#39FF14;}
.rl-en{font-size:9px;color:#39FF14;opacity:.5;margin-top:1px;}
.mission-desc{background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.18);border-radius:10px;padding:11px 13px;font-size:12px;font-weight:600;color:#39FF14;opacity:.85;line-height:1.75;margin-bottom:9px;}
.mission-quote{font-size:14px;font-weight:900;color:#39FF14;line-height:1.55;padding:0 0 9px;border-bottom:1px solid rgba(57,255,20,.2);margin-bottom:10px;}
.path-h{font-size:11px;font-weight:900;color:#39FF14;margin-bottom:7px;text-transform:uppercase;letter-spacing:.05em;opacity:.7;}
.tasks{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.task{background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.14);border-radius:8px;padding:8px 11px;font-size:12px;color:#39FF14;line-height:1.55;display:flex;gap:9px;opacity:.85;}
.task-w{font-size:10px;font-weight:900;color:#39FF14;min-width:50px;flex-shrink:0;opacity:.55;letter-spacing:.03em;}
.share-sec{margin-bottom:10px;}
.share-h{font-size:11px;font-weight:900;color:#39FF14;text-align:center;margin-bottom:7px;opacity:.7;}
.share-btns{display:flex;gap:6px;}
.sbtn{flex:1;padding:9px 5px;border-radius:8px;border:none;cursor:pointer;font-weight:800;font-size:11px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:5px;transition:transform .15s;}
.sbtn:hover{transform:scale(1.03);}
.sb-wa{background:#25D366;color:#fff;}
.sb-cp{background:rgba(57,255,20,.1);color:#39FF14;border:1px solid rgba(57,255,20,.3);}
.sb-tw{background:rgba(57,255,20,.1);color:#39FF14;border:1px solid rgba(57,255,20,.3);}
.copied{font-size:11px;font-weight:700;color:#39FF14;text-align:center;margin-top:4px;opacity:0;transition:opacity .3s;}
.copied.show{opacity:1;}
.retry-btn{width:100%;padding:11px;background:transparent;border:1.5px solid rgba(57,255,20,.4);border-radius:10px;font-size:13px;font-weight:900;color:#39FF14;cursor:pointer;font-family:inherit;margin-bottom:9px;transition:all .15s;}
.retry-btn:hover{border-color:#39FF14;background:rgba(57,255,20,.06);}
.share-note{background:rgba(57,255,20,.06);border:1px solid rgba(57,255,20,.18);border-radius:8px;padding:9px 12px;font-size:11px;font-weight:700;color:#39FF14;text-align:center;line-height:1.6;opacity:.8;}
.ar{direction:rtl;text-align:right;}.en{direction:ltr;text-align:left;}
</style>
</head>
<body>
<div id="app">

<div id="sc-home" class="screen active">
  <div class="starfield" id="sf0"></div>
  <div class="nring" style="width:480px;height:480px;top:35%;left:50%;--nd:7s;--ndd:0s;"></div>
  <div class="nring" style="width:300px;height:300px;top:35%;left:50%;--nd:5s;--ndd:1.5s;"></div>
  <div class="nring" style="width:160px;height:160px;top:35%;left:50%;--nd:4s;--ndd:3s;"></div>
  <div class="orb" style="width:320px;height:100px;top:30%;left:50%;margin:-50px -160px;--os:13s;"><div class="orb-sat">🛸</div></div>
  <div class="fly-robot">🤖</div>
  <div class="content" style="text-align:center;padding-top:36px;">
    <div style="margin-bottom:10px;"><span class="badge-pill">🚀 MISSION BRIEFING</span></div>
    <span class="home-rocket">🚀</span>
    <div class="home-title-ar">هل أنت مستعد لاستكشاف<br>عالم الذكاء الاصطناعي؟</div>
    <div class="home-title-en">Are you ready to explore the AI world?</div>
    <div class="lang-grid">
      <div class="lcard" onclick="boot('ar')"><div class="lcard-flag">🇸🇦</div><div class="lcard-name">عربي</div><div class="lcard-hint">لهجة خليجية</div></div>
      <div class="lcard" onclick="boot('en')"><div class="lcard-flag">🌐</div><div class="lcard-name">English</div><div class="lcard-hint">International</div></div>
    </div>
    <div class="soc-row" id="home-soc"></div>
    <div class="hhandle">الحارث البليهد · @alharethbelaihd</div>
  </div>
</div>

<div id="sc-intro" class="screen">
  <div class="starfield" id="sf1"></div>
  <div class="nring" style="width:400px;height:400px;top:25%;left:50%;--nd:6s;--ndd:0s;"></div>
  <div class="content fade-up" id="intro-body"></div>
</div>

<div id="sc-q" class="screen">
  <div class="starfield" id="sf2"></div>
  <div class="nring" style="width:350px;height:350px;top:20%;left:50%;--nd:7s;--ndd:1s;"></div>
  <div class="content">
    <div class="mission-hdr">
      <div class="mission-tag" id="q-cat-tag">SECTOR 1</div>
      <div class="mission-num" id="q-num">1 / 8</div>
    </div>
    <div class="prog-wrap">
      <div class="prog-track"><div class="prog-bar" id="pb" style="width:12.5%"></div></div>
      <div class="dots" id="dots"></div>
    </div>
    <div id="qbody" class="fade-up"></div>
    <div class="transmission" id="trans"></div>
    <div class="q-nav" id="qnav">
      <button class="btn-back" id="bbk" onclick="goBack()"></button>
      <button class="btn-next" id="bnx" onclick="goNext()" disabled></button>
    </div>
    <div class="handle-bar">
      <div class="mini-soc" id="q-soc"></div>
      <div class="handle-txt" id="q-hdl"></div>
    </div>
  </div>
</div>

<div id="sc-res" class="screen">
  <div class="starfield" id="sf3"></div>
  <div class="nring" style="width:500px;height:500px;top:15%;left:50%;--nd:8s;--ndd:0s;"></div>
  <div class="nring" style="width:280px;height:280px;top:15%;left:50%;--nd:5s;--ndd:2s;"></div>
  <div class="content fade-up" id="res-body"></div>
</div>

</div>
<script>
var APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbw44tNnJ-6SnKJw8RfjlNiX3Cc8QkfWHVn7G3ZeV8DB4vsieqT9CymK0o8Yun3m4x57pQ/exec";
var L='en',role='',ans=new Array(8).fill(0),qi=0;

function genStars(id){var c=document.getElementById(id);if(!c)return;[[1,55],[2,28],[3,10],[4,4]].forEach(function(d){for(var i=0;i<d[1];i++){var el=document.createElement('div');el.className='star '+(d[0]===4?'sh':'tw');var lo=(0.1+Math.random()*0.35).toFixed(2);el.style.cssText='left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*100).toFixed(1)+'%;width:'+d[0]+'px;height:'+d[0]+'px;--d:'+(1.5+Math.random()*3.5).toFixed(1)+'s;--dl:'+(Math.random()*4).toFixed(1)+'s;--lo:'+lo+';';c.appendChild(el);}});for(var p=0;p<12;p++){var pel=document.createElement('div');pel.className='pt';var ps=1+Math.floor(Math.random()*3);pel.style.cssText='left:'+(Math.random()*100).toFixed(1)+'%;top:'+(Math.random()*70).toFixed(1)+'%;width:'+ps+'px;height:'+ps+'px;--pd:'+(4+Math.random()*6).toFixed(1)+'s;--pdd:'+(Math.random()*4).toFixed(1)+'s;--px:'+(-15+Math.random()*30).toFixed(0)+'px;--py:'+(-25+Math.random()*15).toFixed(0)+'px;';c.appendChild(pel);}}
['sf0','sf1','sf2','sf3'].forEach(genStars);
